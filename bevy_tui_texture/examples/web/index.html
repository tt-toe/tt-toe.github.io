<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,"><!-- silence the favicon request -->
  <title>bevy_tui_texture — retro CRT demo (WASM)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* Chrome/Firefox honor this and stop rubber-band/glow overscroll
         chaining outright. Desktop Safari (macOS trackpads in particular)
         still elastic-bounces the page past this - not fully suppressible
         from CSS alone - so it's paired with the flex centering below as a
         fallback: when a bounce reveals a sliver of html/body's background
         past the canvas edge, centering the canvas (rather than the
         default block-flow top/left anchoring) keeps that reveal
         symmetric instead of only ever showing on one side. */
      overscroll-behavior: none;
      background: #101014;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* The demo renders into this canvas (Window.canvas = "#bevy") and
       follows its parent's size (fit_canvas_to_parent = true). Explicit
       max-width/max-height keep it from ever exceeding the flex
       container's box (matters once the container centers rather than
       just stretching its single child to fill). */
    canvas#bevy {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      outline: none;
      /* Hand every touch gesture to the canvas (winit's pointer listeners):
         without this, mobile Safari can claim a tap for scrolling or
         double-tap zoom before the page ever sees pointerdown. */
      touch-action: none;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6em;
      color: #7fbf7f;
      font-family: monospace;
      font-size: 1.1em;
      pointer-events: none;
      text-align: center;
      padding: 0 1em;
    }
    /* Most recent console.warn/console.error line, mirrored under the
       status text - on mobile Safari there is no reachable console without
       a tethered desktop inspector, so this is often the only way to see
       engine/wgpu errors at all. */
    #loading-console {
      max-width: min(600px, 90vw);
      font-size: 0.75em;
      color: #bf9f7f;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }
    #progress-track {
      width: min(320px, 80vw);
      height: 10px;
      border: 1px solid #7fbf7f;
      padding: 1px;
      overflow: hidden; /* clip the fill even if a computed width ever exceeds 100% */
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: #7fbf7f;
      transition: width 0.15s linear;
    }
    /* Indeterminate state (no Content-Length to compute a real percentage):
       a sliding stripe instead of a stalled full/empty bar. */
    #progress-fill.indeterminate {
      width: 30% !important;
      animation: indeterminate-slide 1.2s ease-in-out infinite;
    }
    @keyframes indeterminate-slide {
      0%   { margin-left: 0%; }
      50%  { margin-left: 70%; }
      100% { margin-left: 0%; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div id="loading-text">loading wasm_demo_bg.wasm …</div>
    <div id="progress-track"><div id="progress-fill"></div></div>
    <div id="loading-console"></div>
  </div>
  <canvas id="bevy"></canvas>
  <script type="module">
    // Cache-busting query param, appended to every fetched build artifact
    // below. `wasm_demo.js` and `wasm_demo_bg.wasm` are matched pairs from
    // the SAME build - if a browser's HTTP cache (GitHub Pages sends
    // `cache-control: max-age=600`) has one of the two but not the other
    // from a previous deploy, `WebAssembly.instantiate` fails with a
    // `LinkError` ("function import requires a callable") because the
    // mismatched JS glue and wasm binary disagree on import/export names.
    // Bump ASSET_VERSION (see examples/web/README.md's rebuild steps) every time
    // wasm_demo.js/wasm_demo_bg.wasm are regenerated, so browsers that
    // cached an older pair are forced to re-fetch both together instead of
    // silently mixing old and new.
    const ASSET_VERSION = '0';

    const textEl = document.getElementById('loading-text');
    const fillEl = document.getElementById('progress-fill');
    let currentMsg = 'loading wasm_demo_bg.wasm …';
    const status = (msg) => {
      currentMsg = msg;
      if (textEl) textEl.textContent = msg;
    };

    // Boot-progress hook called from the wasm side (`demo_status` /
    // `report_wasm_boot_status` in examples/retro_crt.rs). The overlay stays
    // up long past init(): engine startup, asset loading, and the synchronous
    // WebGL2 shader compiles all still show a black canvas otherwise. The
    // wasm sends staged milestone strings as they happen, and the special
    // string 'ready' - sent one frame after the CRT model's material lands,
    // i.e. after its first real render - finally removes the overlay.
    // Latched by the FIRST fatal report (a Rust panic forwarded through
    // __demoStatus, or one of the error listeners below). After a wasm trap,
    // every subsequent call into the poisoned module rethrows the same
    // generic "Unreachable code should not be executed" RuntimeError once
    // per rAF - without the latch, that noise immediately overwrites the
    // one message that actually says what went wrong.
    let fatalShown = false;
    const reportFatal = (desc) => {
      if (fatalShown) return;
      fatalShown = true;
      status(desc);
    };

    window.__demoStatus = (msg) => {
      if (msg === 'ready') {
        document.getElementById('loading')?.remove();
      } else if (msg.startsWith('panicked')) {
        reportFatal(msg);
      } else if (!fatalShown) {
        status(msg);
      }
    };

    // Late-failure diagnostics: without these the overlay freezes on the
    // last milestone with no hint of WHY (observed on iPhone Safari, whose
    // GPU/WebGL memory caps sit well below iPad's). Rust panics are
    // forwarded to __demoStatus by the wasm side's own panic hook; these
    // listeners catch what that hook can't:
    // - JS exceptions escaping the engine's rAF callbacks - including the
    //   "unreachable" trap of an OUT-OF-MEMORY abort, which never runs the
    //   panic hook (a failed memory.grow kills the module directly),
    // - WebGL context loss (mobile Safari revokes the context under memory
    //   pressure - the tab survives but rendering silently stops).
    // (winit's "Using exceptions for control flow" startup exception is
    // expected, not an error - filtered here just like in the catch below.)
    const describeError = (raw) => {
      if (`${raw}`.includes('Unreachable code should not be executed')) {
        return `error: ${raw} — the wasm module crashed hard. No "panicked:" `
          + 'message before this usually means an out-of-memory abort '
          + '(memory.grow failed; watch the "heap" figure in the loading '
          + 'status - iPhone Safari caps per-tab memory well below iPad).';
      }
      return `error: ${raw}`;
    };
    window.addEventListener('error', (e) => {
      if (`${e.message}`.includes('Using exceptions for control flow')) return;
      reportFatal(describeError(e.message));
    });
    window.addEventListener('unhandledrejection', (e) => {
      if (`${e.reason}`.includes('Using exceptions for control flow')) return;
      reportFatal(describeError(e.reason));
    });
    document.getElementById('bevy').addEventListener('webglcontextlost', () => {
      reportFatal('WebGL context lost — the browser revoked GPU resources, '
        + 'usually memory pressure (iOS Safari’s GPU memory cap is much lower '
        + 'on iPhone than iPad).');
    });

    // Main-thread liveness ticker: appends a spinner + elapsed seconds to
    // whatever status is showing. Timers share the main thread with the
    // engine's rAF frames, so during a boot stall this splits the two
    // possible worlds at a glance:
    // - spinner keeps turning, status text never advances → the main thread
    //   is alive but an async step never completes (e.g. wgpu renderer
    //   init stuck - the known Bevy 0.19 wasm startup hang looks like this),
    // - spinner frozen too → the main thread itself is stalled (synchronous
    //   shader compile, busy-wait, or the tab is about to be killed).
    const bootT0 = Date.now();
    const SPIN = ['|', '/', '—', '\\'];
    let spinI = 0;
    setInterval(() => {
      if (fatalShown || !textEl || !document.getElementById('loading')) return;
      const secs = Math.round((Date.now() - bootT0) / 1000);
      textEl.textContent = `${currentMsg} ${SPIN[spinI++ % SPIN.length]} ${secs}s`;
    }, 250);

    // Mirror console.warn/console.error lines into the overlay (see
    // #loading-console's CSS comment). bevy_log routes engine/wgpu warnings
    // and errors here on wasm; the panic hook's console output lands here
    // too. Keeps the FIRST few distinct lines plus the latest one - the
    // first error is usually the root cause (e.g. the surface-configure
    // failure) and everything after it cascade noise (e.g. the
    // get_current_texture panic repeating every frame); showing only the
    // last line buried exactly the line that mattered.
    const conEl = document.getElementById('loading-console');
    const conFirst = [];
    let conLast = '';
    const conRender = () => {
      if (!conEl) return;
      const lines = [...conFirst];
      if (conLast && !conFirst.includes(conLast)) lines.push('⋮', conLast);
      conEl.textContent = lines.join('\n');
    };
    for (const level of ['warn', 'error']) {
      const orig = console[level].bind(console);
      console[level] = (...args) => {
        orig(...args);
        const line =
          `console.${level}: ${args.map(String).join(' ')}`.slice(0, 300);
        if (conFirst.length < 3 && !conFirst.includes(line)) conFirst.push(line);
        conLast = line;
        conRender();
      };
    }

    // Shown when init() hands control to the engine (see below). Set BEFORE
    // the first engine frame runs so this exact text is what stays frozen on
    // screen while WebGL2 compiles the base pipelines synchronously (the
    // browser cannot repaint during that stall - it may even show a
    // "page unresponsive" dialog; waiting is the right call).
    const engineStarting = () => {
      fillEl.classList.add('indeterminate');
      status('starting engine — compiling shaders … (the page may freeze for a while)');
    };

    // Fetches `url` while reporting download progress through `onProgress`
    // (called with bytes loaded and total, total=0 if the server didn't
    // send Content-Length). Returns a real `Response` so wasm-bindgen's
    // `init()` can still use `WebAssembly.instantiateStreaming` (parses
    // while downloading) instead of buffering the whole multi-MB body
    // first.
    async function fetchWithProgress(url, onProgress) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`fetch ${url} failed: ${response.status} ${response.statusText}`);
      }
      const total = Number(response.headers.get('Content-Length')) || 0;
      if (!response.body) {
        return response; // ReadableStream unsupported - no progress, just pass through
      }
      const reader = response.body.getReader();
      let loaded = 0;
      const stream = new ReadableStream({
        async pull(controller) {
          const { done, value } = await reader.read();
          if (done) {
            controller.close();
            return;
          }
          loaded += value.byteLength;
          onProgress(loaded, total);
          controller.enqueue(value);
        },
        cancel(reason) {
          reader.cancel(reason);
        },
      });
      // Content-Type must survive (wasm-bindgen/instantiateStreaming checks
      // for "application/wasm"); status/statusText don't matter past `ok`.
      return new Response(stream, { headers: response.headers });
    }

    // `Content-Length` is the size ON THE WIRE. A CDN that gzip/br-encodes
    // the response (GitHub Pages does) reports the COMPRESSED size there,
    // but `fetch()` transparently decompresses the body, so the stream
    // delivers more bytes than that - `loaded` overtakes `total` partway
    // through and a naive percentage blows past 100%, overflowing the bar
    // out of its track. There's no way to read the true decompressed size
    // up front (`Accept-Encoding` can't be overridden from JS), so once a
    // mismatch is caught, `total` is treated as unreliable for the rest of
    // this load and the bar falls back to the indeterminate animation.
    let totalUnreliable = false;
    function reportProgress(loaded, total) {
      if (loaded > total) totalUnreliable = true;
      if (total > 0 && !totalUnreliable) {
        fillEl.classList.remove('indeterminate');
        fillEl.style.width = `${Math.min(100, Math.round((loaded / total) * 100))}%`;
        status(`loading wasm_demo_bg.wasm … ${(loaded / 1e6).toFixed(1)} / ${(total / 1e6).toFixed(1)} MB`);
      } else {
        fillEl.classList.add('indeterminate');
        status(`loading wasm_demo_bg.wasm … ${(loaded / 1e6).toFixed(1)} MB`);
      }
    }

    // WebGL2 availability probe on a THROWAWAY canvas (probing #bevy would
    // take its context and break the demo's own getContext later). If
    // WebGL2 is unavailable (unsupported browser, or blocked - e.g. by
    // Brave's fingerprinting shields), report and stop BEFORE fetching the
    // multi-MB wasm.
    if (!document.createElement('canvas').getContext('webgl2')) {
      document.getElementById('progress-track')?.remove();
      status('WebGL2 is not available in this browser (unsupported, or blocked '
        + 'by the browser’s settings/shields). This demo cannot run.');
    } else {
      const { default: init } = await import(`./wasm_demo.js?v=${ASSET_VERSION}`);
      try {
        const wasmResponse = await fetchWithProgress(
          `./wasm_demo_bg.wasm?v=${ASSET_VERSION}`,
          reportProgress,
        );
        status('compiling / starting …');
        // Passing the Response directly (not wrapped in an options object)
        // hits wasm-bindgen's deprecated call convention: init() checks
        // `Object.getPrototypeOf(x) === Object.prototype` to decide whether
        // `x` is a `{module_or_path, ...}` options object; a Response's
        // prototype is Response.prototype, not Object.prototype, so it fell
        // through to the deprecated branch and just warned (harmlessly) -
        // the current convention wraps it explicitly instead.
        await init({ module_or_path: wasmResponse });
        // init() resolving/throwing only means the event loop is REGISTERED -
        // renderer init, shader compiles, and asset loads all come after, on
        // a still-black canvas. Keep the overlay; the wasm side reports
        // progress via window.__demoStatus above and sends 'ready' once the
        // CRT model has actually rendered.
        engineStarting();
      } catch (e) {
        // winit's control-flow exception is expected on startup, not an error.
        if (`${e}`.includes('Using exceptions for control flow')) {
          engineStarting();
        } else {
          status(`failed to start: ${e}`);
          throw e;
        }
      }
    }
  </script>
</body>
</html>
